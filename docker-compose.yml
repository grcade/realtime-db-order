version: "3.9"

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: realtime_orders_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend

    container_name: realtime_orders_backend

    restart: unless-stopped

    depends_on:
      postgres_db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      DATABASE_HOST: postgres_db

    ports:
      - "3000:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: sh -c "npm run db:setup && npm run dev"

  frontend:
    build:
      context: ./client

    container_name: realtime_orders_frontend

    restart: unless-stopped

    depends_on:
      - backend

    environment:
      VITE_API_URL: http://localhost:3000

    ports:
      - "5173:5173"

    volumes:
      - ./client:/app
      - /app/node_modules

    command: npm run dev -- --host

volumes:
  postgres_data:
